name: Repository Maintenance
description: Track repository-level documentation, build, or process improvements.
title: "[Maintenance]: "
labels:
  - maintenance
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe the maintenance need.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this matters
      description: Explain the repository or contributor impact.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or dependencies
      description: Note any linked issues, approvals, or release timing concerns.
