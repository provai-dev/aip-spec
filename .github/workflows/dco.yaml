name: DCO Sign-off

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  dco:
    name: Verify DCO Sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off on all commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          missing=0
          while IFS= read -r commit; do
            msg=$(git log -1 --format="%B" "$commit")
            if ! echo "$msg" | grep -qE "^Signed-off-by: .+ <.+>"; then
              echo "❌ Commit $commit is missing Signed-off-by trailer"
              echo "   $(git log -1 --format='%s' "$commit")"
              missing=$((missing + 1))
            fi
          done < <(git log --format="%H" "$base".."$head")

          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Fix: add DCO sign-off to unsigned commits using:"
            echo "  git rebase --signoff HEAD~$missing"
            echo "  git push --force-with-lease"
            echo ""
            echo "See CONTRIBUTING.md § 4 — DCO for details."
            exit 1
          fi

          echo "✅ All commits have DCO sign-off"
